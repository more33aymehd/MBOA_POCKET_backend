spring.application.name=mboapocket_app

# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/mboapocket_dev?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=YOUR_JWT_SECRET
jwt.expiration=86400000

# Groq AI
groq.api.key=YOUR_GROQ_API_KEY
groq.model=llama-3.3-70b-versatile

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=YOUR_GMAIL

# CAM PAY (Sandbox)
campay.base-url=https://demo.campay.net/api
campay.token=YOUR_CAMPAY_TOKEN
campay.app-id=YOUR_CAMPAY_APP_ID
# true = mock simulator (no real API call, instant success)
campay.mock=true
